<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Tools</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 24px;
      line-height: 1.5;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tool-link {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid #444;
      border-radius: 8px;
      transition: 0.2s;
      font-weight: 600;
    }

    .tool-link:hover {
      border-color: #fff;
      background: #111;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      padding: 16px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      resize: vertical;
      margin-bottom: 16px;
      font-family: inherit;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 24px;
    }

    button:hover {
      opacity: 0.9;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #222;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #181818;
    }

    .download-btn {
      display: inline-block;
      padding: 8px 14px;
      background: #fff;
      color: #000;
      border-radius: 6px;
      font-weight: 700;
    }

    .download-btn:hover {
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      th,
      td {
        font-size: 12px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="links">
    <a class="tool-link" href="https://yt1s.com.co/youtube-to-mp4/" target="_blank">
      youtube_to_mp4
    </a>

    <a class="tool-link" href="https://9xbuddy.com/en-1ac" target="_blank">
      9xbuddy
    </a>

    <a class="tool-link" href="https://yt5s.io/en27/youtube-to-mp3" target="_blank">
      yt5s: YT to MP3
    </a>

    <a class="tool-link" href="https://tubemp4.is" target="_blank">
      yt5s: YT to MP4
    </a>

    <a class="tool-link" href="https://online-audio-converter.com/" target="_blank">
      audio_converter
    </a>

    <a class="tool-link" href="https://mp3cut.net/change-speed" target="_blank">
      tempo_changer
    </a>
  </div>

  <textarea
    id="input"
    placeholder="Illeszd be ide a YouTube linkeket..."
  ></textarea>

  <button id="searchBtn">Get links</button>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Progress</th>
          <th>Link</th>
          <th>Duration</th>
          <th>Message</th>
        </tr>
      </thead>

      <tbody id="results"></tbody>
    </table>
  </div>

  <script>
    const RAPID_API_KEY =
      '4770b12c5amsh9b06efcd3d10c58p122a93jsna056f7f60658';

    const input = document.getElementById('input');
    const searchBtn = document.getElementById('searchBtn');
    const results = document.getElementById('results');

    searchBtn.addEventListener('click', fetchLinks);

    input.addEventListener('keydown', event => {
      if (event.key === 'Enter' && event.ctrlKey) {
        fetchLinks();
      }
    });

    function extractVideoIds(text) {
      const regex =
        /(?:youtube\.com\/watch\?v=|youtube\.com\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;

      const ids = [];
      let match;

      while ((match = regex.exec(text)) !== null) {
        ids.push(match[1]);
      }

      return [...new Set(ids)];
    }

    async function fetchLinks() {
      const videoIds = extractVideoIds(input.value);

      results.innerHTML = '';

      if (!videoIds.length) {
        alert('Nem található érvényes YouTube link.');
        return;
      }

      for (const id of videoIds) {
        try {
          addLoadingRow(id);

          const response = await fetch(
            `https://youtube-mp36.p.rapidapi.com/dl?id=${id}`,
            {
              method: 'GET',
              headers: {
                'x-rapidapi-host': 'youtube-mp36.p.rapidapi.com',
                'x-rapidapi-key': RAPID_API_KEY
              }
            }
          );

          const data = await response.json();

          removeLoadingRow(id);

          addRow(data);

        } catch (error) {
          console.error(error);

          removeLoadingRow(id);

          addRow({
            title: id,
            status: 'error',
            progress: '-',
            link: '',
            duration: '-',
            msg: 'API hiba'
          });
        }
      }
    }

    function addLoadingRow(id) {
      const row = document.createElement('tr');

      row.id = `loading-${id}`;

      row.innerHTML = `
        <td>${id}</td>
        <td>loading</td>
        <td>...</td>
        <td>-</td>
        <td>-</td>
        <td>Feldolgozás...</td>
      `;

      results.appendChild(row);
    }

    function removeLoadingRow(id) {
      const row = document.getElementById(`loading-${id}`);

      if (row) {
        row.remove();
      }
    }

    function addRow(data) {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${escapeHtml(data.title || '-')}</td>
        <td>${escapeHtml(data.status || '-')}</td>
        <td>${escapeHtml(data.progress || '-')}</td>

        <td>
          ${
            data.link
              ? `<a class="download-btn" href="${data.link}" target="_blank">Download</a>`
              : '-'
          }
        </td>

        <td>${escapeHtml(data.duration || '-')}</td>
        <td>${escapeHtml(data.msg || '-')}</td>
      `;

      results.appendChild(row);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

</body>
</html>
